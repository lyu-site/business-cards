<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>威拓名片管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
.topbar { background: #fff; border-bottom: 1px solid #e0dfd8; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
.app-title { font-size: 16px; font-weight: 600; white-space: nowrap; color: #1a1a18; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid #d3d1c7; border-radius: 8px; font-size: 14px; background: #f5f4f0; outline: none; }
.search-wrap input:focus { border-color: #378ADD; background: #fff; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #888; pointer-events: none; }
.btn-add { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.btn-add:hover { background: #0C447C; }
.sync-status { font-size: 12px; color: #888; white-space: nowrap; }
.sync-status.syncing { color: #378ADD; }
.sync-status.error { color: #A32D2D; }
.sync-status.ok { color: #3B6D11; }
.main { padding: 1.25rem 1.5rem; max-width: 1200px; margin: 0 auto; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.25rem; }
.stat { background: #fff; border: 1px solid #e0dfd8; border-radius: 10px; padding: 0.75rem 1rem; }
.stat-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-val { font-size: 24px; font-weight: 600; color: #185FA5; }
.tag-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.tag-btn { font-size: 12px; padding: 4px 12px; border-radius: 999px; border: 1px solid #d3d1c7; background: #fff; color: #5F5E5A; cursor: pointer; transition: all 0.15s; }
.tag-btn.active { background: #E6F1FB; color: #0C447C; border-color: #378ADD; font-weight: 500; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.card { background: #fff; border: 1px solid #e0dfd8; border-radius: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
.card:hover { border-color: #b5d4f4; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
.card-name { font-weight: 600; font-size: 15px; }
.card-sub { font-size: 12px; color: #888; margin-top: 2px; }
.card-info { font-size: 12px; color: #666; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid #f0efe8; padding-top: 10px; }
.card-info span { display: flex; align-items: flex-start; gap: 6px; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
.p0 { background: #E6F1FB; color: #0C447C; }
.p1 { background: #EAF3DE; color: #27500A; }
.p2 { background: #EEEDFE; color: #3C3489; }
.p3 { background: #FAECE7; color: #712B13; }
.p4 { background: #FAEEDA; color: #633806; }
.empty { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; grid-column: 1/-1; }
.loading-msg { text-align: center; padding: 3rem 1rem; color: #888; font-size: 14px; grid-column: 1/-1; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
.modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
.field { margin-bottom: 0.875rem; }
.field label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
.field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid #d3d1c7; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: #378ADD; }
.field textarea { min-height: 64px; resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.section-label { font-size: 11px; font-weight: 600; color: #378ADD; text-transform: uppercase; letter-spacing: 0.06em; margin: 1rem 0 0.5rem; border-top: 1px solid #f0efe8; padding-top: 1rem; }
.btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
.btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #d3d1c7; background: #fff; font-family: inherit; }
.btn:hover { background: #f5f4f0; }
.btn-primary { background: #E6F1FB; color: #0C447C; border-color: #378ADD; }
.btn-primary:hover { background: #B5D4F4; }
.btn-danger { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
.btn-danger:hover { background: #F7C1C1; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid #f0efe8; font-size: 13px; }
.detail-row:last-of-type { border-bottom: none; }
.dk { color: #888; flex-shrink: 0; margin-right: 12px; white-space: nowrap; }
.dv { color: #1a1a18; text-align: right; word-break: break-all; }
@media (max-width: 500px) { .row2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">威拓名片管理</div>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="搜尋姓名、公司、職稱…" oninput="render()">
  </div>
  <span class="sync-status" id="sync-status">連線中…</span>
  <button class="btn-add" onclick="openAdd()">+ 新增名片</button>
</div>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="tag-filters" id="tag-filters"></div>
  <div class="cards" id="cards"><div class="loading-msg">連線 Google Sheets 中，請稍候…</div></div>
</div>

<div id="modal-add" style="display:none" class="overlay" onclick="if(event.target===this)closeAdd()">
  <div class="modal">
    <div class="modal-title" id="add-title">新增名片</div>

    <div class="section-label">基本資料</div>
    <div class="row2">
      <div class="field"><label>姓名 *</label><input id="f-name" placeholder="王小明"></div>
      <div class="field"><label>公司 *</label><input id="f-company" placeholder="ABC 科技"></div>
    </div>
    <div class="row2">
      <div class="field"><label>職稱</label><input id="f-title" placeholder="產品經理"></div>
      <div class="field"><label>來源</label>
        <select id="f-source">
          <option>實體名片</option><option>Email</option><option>LinkedIn</option>
          <option>活動</option><option>介紹</option><option>其他</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>電話</label><input id="f-phone" placeholder="+886 912 345 678"></div>
      <div class="field"><label>Email</label><input id="f-email" placeholder="name@company.com"></div>
    </div>
    <div class="row2">
      <div class="field"><label>統一編號</label><input id="f-taxid" placeholder="12345678" maxlength="8"></div>
      <div class="field"></div>
    </div>

    <div class="section-label">地址</div>
    <div class="field"><label>聯絡地址</label><input id="f-contact-addr" placeholder="台北市信義區信義路五段 7 號"></div>
    <div class="field"><label>公司地址</label><input id="f-company-addr" placeholder="台北市內湖區瑞光路 123 號"></div>
    <div class="section-label">其他</div>
    <div class="field"><label>標籤（逗號分隔）</label><input id="f-tags" placeholder="潛在客戶, SaaS, 台北"></div>
    <div class="field"><label>備註 / 認識場合</label><textarea id="f-note" placeholder="在哪裡認識、特別記錄…"></textarea></div>

    <div class="btn-row">
      <button class="btn" onclick="closeAdd()">取消</button>
      <button class="btn btn-primary" id="btn-save" onclick="saveCard()">儲存</button>
    </div>
  </div>
</div>

<div id="modal-detail" style="display:none" class="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal" id="detail-content"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzo6I5gqSy1yEnq2GRIa16Bpr9eHtnLCYokaYUxcntF77WtHu7CmcYeu5WH5_mEmspX/exec';
const COLORS=[{bg:'#E6F1FB',c:'#0C447C'},{bg:'#EAF3DE',c:'#27500A'},{bg:'#EEEDFE',c:'#3C3489'},{bg:'#FAECE7',c:'#712B13'},{bg:'#FAEEDA',c:'#633806'},{bg:'#E1F5EE',c:'#085041'},{bg:'#FBEAF0',c:'#72243E'}];
const PC=['p0','p1','p2','p3','p4'];
let cards=[], editId=null, activeTag='all';

function setStatus(msg,type=''){
  const el=document.getElementById('sync-status');
  el.textContent=msg; el.className='sync-status'+(type?' '+type:'');
}

async function api(body){
  const res=await fetch(API,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain'}});
  return res.json();
}

async function loadCards(){
  try{
    setStatus('載入中…','syncing');
    const r=await api({action:'load'});
    if(r.ok){cards=r.data;setStatus('已同步 ✓','ok');}
    else{setStatus('載入失敗','error');}
  }catch(e){setStatus('無法連線','error');}
  render();
}

async function pushSave(){
  try{
    setStatus('儲存中…','syncing');
    const r=await api({action:'save',cards});
    if(r.ok){setStatus('已同步 ✓','ok');}
    else{setStatus('同步失敗','error');}
  }catch(e){setStatus('同步失敗','error');}
}

function av(name){return COLORS[name.charCodeAt(0)%COLORS.length];}
function ini(name){return name.replace(/\s+/g,' ').trim().split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');}
function pc(i){return PC[i%PC.length];}
function allTags(){const s=new Set();cards.forEach(c=>(c.tags||[]).forEach(t=>t.trim()&&s.add(t.trim())));return[...s];}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=cards.filter(c=>{
    const m=!q||[c.name,c.company,c.title,c.email,c.taxid||'',c.contactAddr||'',c.companyAddr||'',c.note||''].join(' ').toLowerCase().includes(q);
    const t=activeTag==='all'||(c.tags||[]).map(x=>x.trim()).includes(activeTag);
    return m&&t;
  });
  const tags=allTags();
  document.getElementById('tag-filters').innerHTML=tags.length?['all',...tags].map(t=>
    `<button class="tag-btn${activeTag===t?' active':''}" onclick="setTag('${t.replace(/'/g,"\\'")}')">${t==='all'?'全部':t}</button>`
  ).join(''):'';
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">聯絡人</div><div class="stat-val">${cards.length}</div></div>
    <div class="stat"><div class="stat-label">公司</div><div class="stat-val">${new Set(cards.map(c=>c.company)).size}</div></div>
    <div class="stat"><div class="stat-label">標籤</div><div class="stat-val">${tags.length}</div></div>
  `;
  const cont=document.getElementById('cards');
  if(!filtered.length){cont.innerHTML=`<div class="empty">${cards.length===0?'還沒有名片，點右上角新增！':'找不到符合的名片'}</div>`;return;}
  cont.innerHTML=filtered.map(c=>{
    const a=av(c.name);
    const pills=(c.tags||[]).filter(t=>t.trim()).map((t,i)=>`<span class="pill ${pc(i)}">${t.trim()}</span>`).join('');
    return `<div class="card" onclick="openDetail(${c.id})">
      <div class="card-head">
        <div class="avatar" style="background:${a.bg};color:${a.c}">${ini(c.name)}</div>
        <div><div class="card-name">${c.name}</div><div class="card-sub">${[c.title,c.company].filter(Boolean).join(' · ')}</div></div>
      </div>
      <div class="card-info">
        ${c.email?`<span>&#9993; ${c.email}</span>`:''}
        ${c.phone?`<span>&#9742; ${c.phone}</span>`:''}
        ${c.companyAddr?`<span>&#128205; ${c.companyAddr}</span>`:''}
        ${c.source?`<span>&#9675; ${c.source}</span>`:''}
      </div>
      ${pills?`<div class="card-tags">${pills}</div>`:''}
    </div>`;
  }).join('');
}

function setTag(t){activeTag=t;render();}

function openAdd(){
  editId=null;
  document.getElementById('add-title').textContent='新增名片';
  ['name','company','title','phone','email','taxid','contact-addr','company-addr','tags','note'].forEach(f=>{
    const el=document.getElementById('f-'+f);if(el)el.value='';
  });
  document.getElementById('f-source').value='實體名片';
  document.getElementById('modal-add').style.display='flex';
}
function closeAdd(){document.getElementById('modal-add').style.display='none';}
function closeDetail(){document.getElementById('modal-detail').style.display='none';}

async function saveCard(){
  const name=document.getElementById('f-name').value.trim();
  const company=document.getElementById('f-company').value.trim();
  if(!name||!company){alert('請填寫姓名和公司');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='儲存中…';
  const card={
    id:editId||Date.now(),name,company,
    title:document.getElementById('f-title').value.trim(),
    phone:document.getElementById('f-phone').value.trim(),
    email:document.getElementById('f-email').value.trim(),
    taxid:document.getElementById('f-taxid').value.trim(),
    contactAddr:document.getElementById('f-contact-addr').value.trim(),
    companyAddr:document.getElementById('f-company-addr').value.trim(),
    source:document.getElementById('f-source').value,
    tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    note:document.getElementById('f-note').value.trim(),
  };
  if(editId){cards=cards.map(c=>c.id===editId?card:c);}else{cards=[card,...cards];}
  closeAdd();render();
  await pushSave();
  btn.disabled=false;btn.textContent='儲存';
}

function openDetail(id){
  const c=cards.find(x=>String(x.id)===String(id));if(!c)return;
  const a=av(c.name);
  const pills=(c.tags||[]).filter(t=>t.trim()).map((t,i)=>`<span class="pill ${pc(i)}">${t.trim()}</span>`).join('');
  const rows=[
    ['公司',c.company],['職稱',c.title],['電話',c.phone],['Email',c.email],
    ['統一編號',c.taxid],['聯絡地址',c.contactAddr],['公司地址',c.companyAddr],
    ['來源',c.source],['備註',c.note]
  ].filter(r=>r[1]).map(r=>`<div class="detail-row"><span class="dk">${r[0]}</span><span class="dv">${r[1]}</span></div>`).join('');
  document.getElementById('detail-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div style="width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;background:${a.bg};color:${a.c};flex-shrink:0;">${ini(c.name)}</div>
        <div><div style="font-size:17px;font-weight:600;">${c.name}</div><div style="font-size:13px;color:#888;margin-top:3px;">${[c.title,c.company].filter(Boolean).join(' · ')}</div></div>
      </div>
      <button onclick="closeDetail()" style="border:none;background:none;cursor:pointer;font-size:20px;color:#888;line-height:1;padding:2px 6px;font-family:inherit;">&#10005;</button>
    </div>
    ${rows}
    ${pills?`<div class="card-tags" style="margin-top:12px;">${pills}</div>`:''}
    <div class="btn-row" style="margin-top:1.25rem;">
      <button class="btn btn-danger" onclick="deleteCard(${c.id})">刪除</button>
      <button class="btn" onclick="closeDetail()">關閉</button>
      <button class="btn btn-primary" onclick="openEdit(${c.id})">編輯</button>
    </div>
  `;
  document.getElementById('modal-detail').style.display='flex';
}

function openEdit(id){
  const c=cards.find(x=>String(x.id)===String(id));if(!c)return;
  editId=id;
  document.getElementById('add-title').textContent='編輯名片';
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-company').value=c.company||'';
  document.getElementById('f-title').value=c.title||'';
  document.getElementById('f-phone').value=c.phone||'';
  document.getElementById('f-email').value=c.email||'';
  document.getElementById('f-taxid').value=c.taxid||'';
  document.getElementById('f-contact-addr').value=c.contactAddr||'';
  document.getElementById('f-company-addr').value=c.companyAddr||'';
  document.getElementById('f-source').value=c.source||'實體名片';
  document.getElementById('f-tags').value=(c.tags||[]).join(', ');
  document.getElementById('f-note').value=c.note||'';
  closeDetail();
  document.getElementById('modal-add').style.display='flex';
}

async function deleteCard(id){
  if(!confirm('確定要刪除這張名片嗎？'))return;
  cards=cards.filter(c=>String(c.id)!==String(id));
  closeDetail();render();
  await pushSave();
}

loadCards();
</script>
</body>
</html>
